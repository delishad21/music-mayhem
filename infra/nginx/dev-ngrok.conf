resolver 127.0.0.11 valid=10s;

server {
  listen 80;
  server_name _;

  client_max_body_size 50m;

  set $frontend_upstream frontend:3000;
  set $game_upstream game-service:5000;

  # NextAuth routes live in the frontend
  location ^~ /api/auth {
    proxy_pass http://$frontend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy API requests to the game service
  location /api/ {
    rewrite ^/api/(.*)$ /api/$1 break;
    proxy_pass http://$game_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy Socket.IO (WebSocket) to the game service
  location /socket.io/ {
    rewrite ^/socket.io/(.*)$ /socket.io/$1 break;
    proxy_pass http://$game_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy audio files from the game service
  location /audio/ {
    rewrite ^/audio/(.*)$ /audio/$1 break;
    proxy_pass http://$game_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Everything else goes to the frontend
  location / {
    proxy_pass http://$frontend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
