version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: music-game-mongo
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongodb_data:/data/db
    networks:
      - music-game-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Song Download Service (Python Flask API)
  song-service:
    image: ${DOCKERHUB_USERNAME:-musicgame}/musicgame-song-service:latest
    container_name: music-game-songs
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - SPOTIFY_MARKET=${SPOTIFY_MARKET}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - USE_YT_MUSIC=${USE_YT_MUSIC}
      - YT_MUSIC_ONLY=${YT_MUSIC_ONLY}
      - YTM_LYRICS_FIRST=${YTM_LYRICS_FIRST}
      - USE_MUSICBRAINZ=${USE_MUSICBRAINZ}
      - MUSICBRAINZ_USER_AGENT=${MUSICBRAINZ_USER_AGENT}
      - SYNCEDLYRICS_PROVIDERS=${SYNCEDLYRICS_PROVIDERS}
      - SYNCEDLYRICS_ENHANCED=${SYNCEDLYRICS_ENHANCED}
      - MIN_LYRIC_SIMILARITY=${MIN_LYRIC_SIMILARITY}
      - YTDLP_POT_PROVIDER_URL=${YTDLP_POT_PROVIDER_URL:-http://pot-provider:4416}
      - YTDLP_PLAYER_CLIENTS=${YTDLP_PLAYER_CLIENTS:-mweb,web_safari,web_embedded,tv}
      - YTDLP_REMOTE_COMPONENTS=${YTDLP_REMOTE_COMPONENTS:-ejs:github}
      - YTDLP_COOKIES_FILE=
    volumes:
      - ./song-service/cookies.txt:/run/secrets/yt-dlp-cookies.txt:ro
      - song_data:/app/songs
    networks:
      - music-game-network
    depends_on:
      mongodb:
        condition: service_healthy
      pot-provider:
        condition: service_started

  # YouTube PO-token provider for yt-dlp.
  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1-deno
    container_name: music-game-pot-provider
    restart: unless-stopped
    networks:
      - music-game-network

  # Game API (Express + Socket.IO)
  game-service:
    image: ${DOCKERHUB_USERNAME:-musicgame}/musicgame-game-service:latest
    container_name: music-game-game-service
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - PORT=${PORT}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV}
      - FRONTEND_URL=${FRONTEND_URL}
      - SONG_SERVICE_URL=${SONG_SERVICE_URL}
      - SONG_SERVICE_PATH=${SONG_SERVICE_PATH}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - MAX_PARALLEL_DOWNLOADS=${MAX_PARALLEL_DOWNLOADS:-2}
    volumes:
      - song_data:/app/songs:ro
    networks:
      - music-game-network
    depends_on:
      mongodb:
        condition: service_healthy
      song-service:
        condition: service_started

  # Frontend (Next.js)
  frontend:
    image: ${DOCKERHUB_USERNAME:-musicgame}/musicgame-frontend:latest
    container_name: music-game-frontend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_BACKEND_URL=${NEXT_BACKEND_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    networks:
      - music-game-network
    depends_on:
      - game-service

  # Single-URL reverse proxy (for production)
  edge:
    image: nginx:1.27-alpine
    container_name: music-game-edge
    restart: unless-stopped
    ports:
      - "5762:80"
    volumes:
      - ./infra/nginx/dev-ngrok.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - music-game-network
    depends_on:
      - frontend
      - game-service

volumes:
  mongodb_data:
    driver: local
  song_data:
    driver: local

networks:
  music-game-network:
    driver: bridge
